<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Portofolio Website HTML CSS JS | AWP</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <header class="header">
      <a href="#" class="logo">Portofolio</a>

      <nav class="navbar">
        <a href="#" style="--i: 1" class="active">Home</a>
        <a href="#" style="--i: 2">About</a>
        <a href="#" style="--i: 3">Skills</a>
        <a href="#" style="--i: 4">Portofolio</a>
        <a href="#" style="--i: 5">Contact</a>
      </nav>
    </header>

    <section class="home">
      <div class="home-content">
        <h3>Hello It's Me</h3>
        <h1>Agus Wandi Putera</h1>
        <h3>And i'm a <span class="multiple-text"></span></h3>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Culpa
          suscipit repellendus nihil voluptates veritatis! Cum?
        </p>
        <div class="social-media">
          <a href="#" style="--i: 7"><i data-feather="facebook"></i></a>
          <a href="#" style="--i: 8"><i data-feather="instagram"></i></a>
          <a href="#" style="--i: 9"><i data-feather="twitter"></i></a>
          <a href="#" style="--i: 10"><i data-feather="linkedin"></i></a>
        </div>
        <a href="#" class="btn">Download CV</a>
      </div>
      <div class="home-img" data-tilt data-tilt-perspective="600">
        <img src="img/home.png" alt="" />
      </div>
    </section>

    <script src="https://unpkg.com/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script src="script.js"></script>
    <script>
      feather.replace();
    </script>
  </body>
</html>
